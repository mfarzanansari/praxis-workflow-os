name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PYTHONDONTWRITEBYTECODE: "1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: windows-latest
            python: "3.11"
          - os: macos-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python }}
      - name: Validate release readiness
        run: |
          python scripts/validate_repository.py --strict
          python scripts/validate_release.py
      - name: Run deterministic tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test POSIX installer wrapper
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sh -n install.sh
          ./install.sh --target "$RUNNER_TEMP/praxis-wrapper-smoke" --dry-run
      - name: Smoke-test PowerShell installer wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "praxis-wrapper-smoke"
          ./install.ps1 -Target $target -DryRun
      - name: Verify repository manifest
        run: python scripts/build_manifest.py --check
      - name: Build release archives
        run: python scripts/build_release.py --clean
